<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORCA - Preview Animations</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --card: #141414;
    --border: #262626;
    --text: #f5f5f5;
    --muted: #a3a3a3;
    --primary: #6d28d9;
    --primary-light: rgba(109, 40, 217, 0.15);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ═══════════ HERO placeholder ═══════════ */
  .hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    text-align: center;
    padding: 20px;
  }
  .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; }
  .hero p { color: var(--muted); font-size: 1.1rem; max-width: 500px; }
  .scroll-hint {
    margin-top: 40px;
    color: var(--muted);
    font-size: 0.85rem;
    animation: bounce 2s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(8px); }
  }

  /* ═══════════ QUALIFICATION SECTION ═══════════ */
  .qualification {
    position: relative;
    height: 300vh;
    background: var(--bg);
  }
  .qualification .sticky-wrap {
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    align-items: center;
  }
  .qualification .inner {
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
    padding: 0 24px;
    display: grid;
    grid-template-columns: 2fr 3fr;
    gap: 64px;
    align-items: center;
  }
  .qualification h2 {
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 900;
    line-height: 1.25;
  }
  .progress-dots {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }
  .progress-dots .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(163, 163, 163, 0.25);
    transition: transform 0.3s, background 0.3s;
  }
  .progress-dots .dot.active {
    background: var(--primary);
    transform: scale(1.5);
  }
  .cards-area {
    position: relative;
    min-height: 140px;
  }
  .qualif-card {
    position: absolute;
    inset: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    opacity: 0;
    transform: translateY(20px) scale(0.97);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .qualif-card.active {
    opacity: 1;
    transform: translateY(0) scale(1);
    z-index: 10;
  }
  .qualif-card .emoji { font-size: 1.6rem; flex-shrink: 0; margin-top: 2px; }
  .qualif-card h3 { font-weight: 700; font-size: 1.1rem; margin-bottom: 4px; }
  .qualif-card p { font-size: 0.9rem; color: var(--muted); }
  .qualif-card p span { color: rgba(245,245,245,0.7); font-weight: 500; }

  /* ═══════════ METHOD SECTION ═══════════ */
  .method {
    background: var(--card);
    padding: 80px 24px;
  }
  .method .inner { max-width: 800px; margin: 0 auto; }
  .method h2 {
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 900;
    text-align: center;
    margin-bottom: 8px;
  }
  .method h2 span { color: var(--primary); }
  .method .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 60px;
  }
  .timeline-wrap { position: relative; }
  .timeline-line {
    position: absolute;
    left: 50%;
    top: 0; bottom: 0;
    width: 3px;
    background: #333;
    transform: translateX(-50%);
  }
  .timeline-progress {
    position: absolute;
    left: 50%;
    top: 0;
    width: 3px;
    height: 0%;
    background: var(--primary);
    transform: translateX(-50%);
    z-index: 1;
    transition: height 0.1s linear;
  }
  .step-row {
    position: relative;
    display: flex;
    align-items: flex-start;
    min-height: 120px;
    margin-bottom: 24px;
  }
  .step-dot {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--border);
    border: 3px solid var(--bg);
    z-index: 10;
    transition: background 0.3s, transform 0.3s;
  }
  .step-dot.active {
    background: var(--primary);
    transform: translateX(-50%) scale(1.3);
  }
  .step-card {
    width: 45%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    opacity: 0.25;
    transform: translateY(10px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .step-card.active {
    opacity: 1;
    transform: translateY(0);
  }
  .step-row.left .step-card {
    margin-right: auto;
    padding-right: 32px;
    text-align: right;
  }
  .step-row.right .step-card {
    margin-left: auto;
    padding-left: 32px;
  }
  .step-card .step-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .step-row.left .step-header { justify-content: flex-end; }
  .step-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--primary-light);
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--primary);
  }
  .step-card h3 { font-weight: 700; font-size: 1.15rem; margin-bottom: 4px; }
  .step-card p { font-size: 0.95rem; color: var(--muted); }

  /* ═══════════ SPACER ═══════════ */
  .spacer {
    height: 50vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.9rem;
  }

  /* ═══════════ MOBILE ═══════════ */
  @media (max-width: 768px) {
    .qualification .inner {
      grid-template-columns: 1fr;
      gap: 24px;
      text-align: center;
    }
    .progress-dots { justify-content: center; }
    .cards-area { min-height: 160px; }
    .qualif-card { padding: 20px; }

    .timeline-line, .timeline-progress { left: 20px; }
    .step-dot { left: 20px; }
    .step-row.left .step-card,
    .step-row.right .step-card {
      width: auto;
      margin-left: 48px;
      margin-right: 0;
      text-align: left;
    }
    .step-row.left .step-header { justify-content: flex-start; }
  }
</style>
</head>
<body>

<!-- ═══════════ HERO ═══════════ -->
<section class="hero">
  <h1>ORCA</h1>
  <p>Preview des animations scroll - Qualification & Method</p>
  <div class="scroll-hint">Scrollez pour voir les animations</div>
</section>

<!-- ═══════════ QUALIFICATION ═══════════ -->
<section class="qualification" id="qualification">
  <div class="sticky-wrap">
    <div class="inner">
      <div>
        <h2>ORCA est faite pour vous si...</h2>
        <div class="progress-dots" id="progressDots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
      <div class="cards-area" id="cardsArea"></div>
    </div>
  </div>
</section>

<!-- ═══════════ SPACER ═══════════ -->
<div class="spacer">- - -</div>

<!-- ═══════════ METHOD ═══════════ -->
<section class="method" id="method">
  <div class="inner">
    <h2>La methode pour obtenir des <span>resultats</span></h2>
    <p class="subtitle">Et enfin accelerer vos performances.</p>
    <div class="timeline-wrap" id="timelineWrap">
      <div class="timeline-line"></div>
      <div class="timeline-progress" id="timelineProgress"></div>
    </div>
  </div>
</section>

<!-- ═══════════ END SPACER ═══════════ -->
<div class="spacer">Fin de la preview</div>

<script>
// ── DATA ──
const qualifs = [
  { emoji: "\uD83C\uDFAF", title: "Vous testez des pubs sans creas dediees", result: "vos couts montent et rien n'est stable." },
  { emoji: "\uD83D\uDCC9", title: "Vous produisez en interne mais ca plafonne", result: "peu d'iterations, beaucoup de temps perdu." },
  { emoji: "\uD83E\uDDE9", title: "Vous avez du contenu mais pas de methode", result: "impossible d'identifier les winners." },
  { emoji: "\uD83D\uDD0D", title: "Vous voulez scaler sans piloter a l'aveugle", result: "sans tracking propre, les decisions sont faussees." },
];

const steps = [
  { num: 1, emoji: "\uD83C\uDFAF", title: "Audit & objectifs", desc: "On part de vos chiffres et de votre offre." },
  { num: 2, emoji: "\uD83E\uDDE0", title: "Angles & offre", desc: "On definit les angles a tester." },
  { num: 3, emoji: "\u270D\uFE0F", title: "Scripts & hooks", desc: "Hooks forts, objections, CTA. Variations." },
  { num: 4, emoji: "\uD83C\uDFAC", title: "Production", desc: "Tournage organise ou production a distance." },
  { num: 5, emoji: "\u26A1", title: "Montage oriente perf", desc: "Rythme, sous-titres, patterns, declinaisons." },
  { num: 6, emoji: "\uD83D\uDCC8", title: "Lancement + tests", desc: "A/B tests, lecture des signaux, premiers winners." },
  { num: 7, emoji: "\uD83D\uDD01", title: "Optimisation & scaling", desc: "Iterations continues et montee en puissance." },
];

// ── BUILD QUALIFICATION CARDS ──
const cardsArea = document.getElementById("cardsArea");
qualifs.forEach((q, i) => {
  const card = document.createElement("div");
  card.className = "qualif-card";
  card.dataset.index = i;
  card.innerHTML = `
    <span class="emoji">${q.emoji}</span>
    <div>
      <h3>${q.title}</h3>
      <p><span>Resultat :</span> ${q.result}</p>
    </div>
  `;
  cardsArea.appendChild(card);
});

// ── BUILD METHOD STEPS ──
const timelineWrap = document.getElementById("timelineWrap");
steps.forEach((s, i) => {
  const row = document.createElement("div");
  row.className = `step-row ${i % 2 === 0 ? "left" : "right"}`;
  row.dataset.index = i;
  row.innerHTML = `
    <div class="step-dot" data-index="${i}"></div>
    <div class="step-card" data-index="${i}">
      <div class="step-header">
        <span class="step-num">${s.num}</span>
        <span>${s.emoji}</span>
      </div>
      <h3>${s.title}</h3>
      <p>${s.desc}</p>
    </div>
  `;
  timelineWrap.appendChild(row);
});

// ── SCROLL ANIMATION ENGINE ──
function getScrollProgress(el, offsetStart, offsetEnd) {
  const rect = el.getBoundingClientRect();
  const viewH = window.innerHeight;
  // offsetStart/End: "start start" → element top hits viewport top = 0
  const totalScroll = el.scrollHeight - viewH;
  const scrolled = -rect.top;
  return Math.max(0, Math.min(1, scrolled / (el.scrollHeight - viewH)));
}

function animateQualification() {
  const section = document.getElementById("qualification");
  const rect = section.getBoundingClientRect();
  const totalScroll = section.scrollHeight - window.innerHeight;
  const progress = Math.max(0, Math.min(1, -rect.top / totalScroll));

  const cards = document.querySelectorAll(".qualif-card");
  const dots = document.querySelectorAll("#progressDots .dot");
  const total = qualifs.length;
  const segmentSize = 1 / total;

  let activeIndex = Math.floor(progress * total);
  if (activeIndex >= total) activeIndex = total - 1;

  cards.forEach((card, i) => {
    card.classList.toggle("active", i === activeIndex);
  });
  dots.forEach((dot, i) => {
    dot.classList.toggle("active", i === activeIndex);
  });
}

function animateMethod() {
  const section = document.getElementById("method");
  const rect = section.getBoundingClientRect();
  const viewH = window.innerHeight;

  // Progress: when section center enters viewport center
  const sectionCenter = rect.top + rect.height / 2;
  const viewCenter = viewH / 2;
  const progress = Math.max(0, Math.min(1,
    1 - (sectionCenter - viewCenter) / (rect.height)
  ));

  // More accurate progress based on section scroll
  const startTrigger = rect.top - viewH * 0.5;
  const endTrigger = rect.bottom - viewH * 0.5;
  const totalRange = endTrigger - startTrigger;
  const methodProgress = Math.max(0, Math.min(1, -startTrigger / totalRange));

  // Timeline progress bar
  document.getElementById("timelineProgress").style.height = (methodProgress * 100) + "%";

  // Step cards & dots
  const total = steps.length;
  document.querySelectorAll(".step-card").forEach((card, i) => {
    const threshold = (i + 0.3) / total;
    card.classList.toggle("active", methodProgress >= threshold);
  });
  document.querySelectorAll(".step-dot").forEach((dot, i) => {
    const threshold = (i + 0.3) / total;
    dot.classList.toggle("active", methodProgress >= threshold);
  });
}

// ── RAF LOOP ──
function onScroll() {
  animateQualification();
  animateMethod();
}

window.addEventListener("scroll", onScroll, { passive: true });
onScroll();
</script>

</body>
</html>
